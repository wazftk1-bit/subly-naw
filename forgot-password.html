<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Subly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <!-- NAVIGATION -->
  <nav class="navbar">
    <div class="logo">Sub<span>ly</span>.</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#features">Features</a></li>
      <li><a href="index.html#pricing">Pricing</a></li>
    </ul>
    <button class="btn-nav" onclick="window.location.href='register.html'">Get Started</button>
  </nav>

  <!-- FORGOT PASSWORD FORM -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-header">
        <h1>Forgot Password?</h1>
        <p>Enter your email and we'll send you a link to reset your password</p>
      </div>

      <form class="auth-form" id="forgotPasswordForm" action="login.html" method="GET">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required>
        </div>

        <button type="submit" class="btn-auth">Send Reset Link</button>
      </form>

      <div class="auth-footer">
        <p>Remember your password? <a href="login.html">Sign In</a></p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="logo">Sub<span>ly</span>.</div>
    <p>2026 Subly. All rights reserved. Built for modern businesses.</p>
  </footer>

</body>
</html>
