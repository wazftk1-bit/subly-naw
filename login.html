<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Subly</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    .error-message { 
      background: #fee2e2; 
      color: #dc2626; 
      padding: 12px; 
      border-radius: 8px; 
      margin-bottom: 16px; 
      display: none; 
    }
    .error-message.show { display: block; }
    
    .success-message { 
      background: #d1fae5; 
      color: #059669; 
      padding: 12px; 
      border-radius: 8px; 
      margin-bottom: 16px; 
      display: none; 
    }
    .success-message.show { display: block; }
  </style>
</head>
<body class="auth-page">

  <nav class="navbar">
    <div class="logo">Sub<span>ly</span>.</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#features">Features</a></li>
      <li><a href="index.html#pricing">Pricing</a></li>
    </ul>
    <button class="btn-nav" onclick="window.location.href='register.html'">Get Started</button>
  </nav>

  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to manage your subscriptions</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <!-- Google Sign-In -->
      <div id="g_id_onload"
           data-client_id="377715947782-aagkirvgigig15prljcq4705t3h53s41.apps.googleusercontent.com"
           data-callback="handleGoogleSignIn"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="sign_in_with"
           data-shape="rectangular"
           data-logo_alignment="left">
      </div>

      <div class="auth-divider">
        <span>or sign in with email</span>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="remember">
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">Sign In</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Create one</a></p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="logo">Sub<span>ly</span>.</div>
    <p>2026 Subly. All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script>
    const API_URL = 'https://subly-api-production-2b44.up.railway.app';
    
    // Google Sign-In Handler
    async function handleGoogleSignIn(response) {
      console.log('Google response:', response);
      
      try {
        const token = response.credential;
        const payload = JSON.parse(atob(token.split('.')[1]));
        
        console.log('Google user:', payload);
        
        // Send to backend
        const res = await fetch(`${API_URL}/api/auth/google`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token: token,
            email: payload.email,
            name: payload.name,
            picture: payload.picture
          })
        });
        
        const data = await res.json();
        console.log('Backend response:', data);
        
        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        } else {
          showError(data.message || 'Login failed');
        }
      } catch (error) {
        console.error('Google login error:', error);
        showError('Google login failed: ' + error.message);
      }
    }
    
    // Email Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submitBtn');
      
      submitBtn.textContent = 'Signing in...';
      submitBtn.disabled = true;
      
      try {
        const data = await api.login(email, password);
        if (data.success) {
          window.location.href = 'dashboard.html';
        }
      } catch (error) {
        showError(error.message || 'Invalid email or password');
      } finally {
        submitBtn.textContent = 'Sign In';
        submitBtn.disabled = false;
      }
    });
    
    function showError(msg) {
      const el = document.getElementById('errorMessage');
      el.textContent = msg;
      el.classList.add('show');
    }
    
    function showSuccess(msg) {
      const el = document.getElementById('successMessage');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
